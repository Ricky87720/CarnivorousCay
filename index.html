<!DOCTYPE html>
<html> 
<body>

    

    <div class="centerbox">
        <h1>Welcome, Cayleigh</h1>

        <p class="enter">Enter your favorite word</p>
       <div class="input-container">
    <img src="images/ug_Lessser_Enchi_Clown_Ball_Python_2-1.png" class="input-icon">
    <input type="password" id="loginInput" class="inputbox" placeholder="Favorite word">
    <img src="images/ug_Lessser_Enchi_Clown_Ball_Python_2-1.png" class="input-icon">
</div>
        <button class="button" onclick="signIn()">
            Continue
        </button>
    </div>
   

</body>
<script>
function signIn() {

    let value = document.getElementById("loginInput").value;

    if (value.toLowerCase() === "fuck") {

        window.location.href = "pres1.html";

    } else {

        document.getElementById("popup").style.display = "flex";

    }
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}


</script>
    <style>


body {
    background-image: url("images/95.webp");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
    margin: 0;
}


.enter {
    font-size: 25px;
}

.inputbox {
font-size: 18px;
} 

.button {
    font-size: 18px;
    padding: 2px;
}

.centerbox {
    width: 500px;
    height: 300px;
    background-color: rgb(63, 122, 60);
    border-radius: 10px;
    text-align: center;
    padding-top: 30px;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.input-icon {
    position: left;
    width: 80px;
    height: 80px;
}

.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background-color: rgba(0,0,0,0.5);

    justify-content: center;
    align-items: center;
}

.popup-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    width: 200px;
}

.popup-box img {
    width: 80px;
}

.close {
    cursor: pointer;
    float: right;
    font-size: 25px;
}

p {
    font-size: 20px;
}
  </style>

  <div id="popup" class="popup">
    <div class="popup-box">
        <span class="close" onclick="closePopup()">×</span>
        <img src="images/Red_X.svg.png" alt="Error">
        <p>Try Again<br>
            btw enjoy the music</p>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="music/Coconut Mall - Mario Kart Wii OST.mp3" type="audio/mpeg">
</audio>
<script>
let musicStarted = false;

function startMusic() {
    if (!musicStarted) {
        document.getElementById("bgMusic").play();
        musicStarted = true;
    }
}

// start music on ANY click anywhere on page
document.addEventListener("click", startMusic);
</script>
