<script>
let musicStarted = false;

function startMusic() {
    if (!musicStarted) {
        const audio = document.getElementById("bgMusic");
        audio.play().catch(err => console.log("Blocked:", err));
        musicStarted = true;
    }
}

// start music on ANY click
document.addEventListener("click", startMusic);

function playSong(song) {
    const audio = document.getElementById("bgMusic");

    if (song === "song1") {
        audio.src = "music2/Leon Thomas - VIBES DON'T LIE (Audio) - (64 Kbps).mp3";
    }

    if (song === "song2") {
        audio.src = "music1/Daniel Caesar - Get You ft. Kali Uchis - (64 Kbps).mp3";
    }

    if (song === "song3") {
        audio.src = "music1/Jhené Aiko - stranger (Audio) - (original Kbps).mp3";
    }

        if (song === "song4") {
        audio.src = "music3/Lucky Daye - Used To Be (Audio) - (original Kbps).mp3";
    }

        if (song === "song5") {
        audio.src = "music3/Mario - Moan (Official Visualizer).mp3";
    }

        if (song === "song6") {
        audio.src = "music4/SZA - 2AM (Official Audio).mp3";
    }

            if (song === "song7") {
        audio.src = "music4/Poison.mp3";
    }

            if (song === "song8") {
        audio.src = "music4/Violet Grohl - Pool Of My Dreams (Official Visualizer).mp3";
    }


    audio.load();
    audio.play();
    musicStarted = true;
}
</script>


<script>
function toggleGifs() {
    const box = document.getElementById("gifBox");

    if (box.style.display === "none" || box.style.display === "") {
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}
</script>
